<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Vaultia 7-dot matrix favicon — Light mode (dots in vaultia-black #1D1D1F) -->
  <!-- Row 1: 3 dots centered -->
  <circle cx="8"  cy="12" r="3" fill="#1D1D1F"/>
  <circle cx="16" cy="12" r="3" fill="#1D1D1F"/>
  <circle cx="24" cy="12" r="3" fill="#1D1D1F"/>
  <!-- Row 2: 2 dots (offset inward) -->
  <circle cx="11" cy="20" r="3" fill="#1D1D1F"/>
  <circle cx="21" cy="20" r="3" fill="#1D1D1F"/>
  <!-- Row 3: 2 dots (further inward, forming V apex) -->
  <circle cx="13" cy="27" r="2.5" fill="#1D1D1F"/>
  <circle cx="19" cy="27" r="2.5" fill="#1D1D1F"/>
</svg>

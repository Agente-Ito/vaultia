<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Vaultia 7-dot matrix favicon — Dark mode (dots in vaultia-white #F9F9F9) -->
  <!-- Row 1: 3 dots centered -->
  <circle cx="8"  cy="12" r="3" fill="#F9F9F9"/>
  <circle cx="16" cy="12" r="3" fill="#F9F9F9"/>
  <circle cx="24" cy="12" r="3" fill="#F9F9F9"/>
  <!-- Row 2: 2 dots (offset inward) -->
  <circle cx="11" cy="20" r="3" fill="#F9F9F9"/>
  <circle cx="21" cy="20" r="3" fill="#F9F9F9"/>
  <!-- Row 3: 2 dots (further inward, forming V apex) -->
  <circle cx="13" cy="27" r="2.5" fill="#F9F9F9"/>
  <circle cx="19" cy="27" r="2.5" fill="#F9F9F9"/>
</svg>
